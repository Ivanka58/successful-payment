<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CerberAI - Оплата прошла успешно</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #22d3ee;
            --success: #10b981;
            --bg-dark: #0f0f1a;
            --bg-card: rgba(30, 30, 50, 0.6);
            --text: #ffffff;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: cardIn 0.8s ease-out 0.2s forwards;
        }
        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .icon-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            opacity: 0;
            transform: scale(0.5);
            animation: iconIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
        }
        @keyframes iconIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .icon-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--success), #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 60px rgba(16, 185, 129, 0.4),
                0 0 100px rgba(16, 185, 129, 0.2),
                inset 0 -4px 20px rgba(0, 0, 0, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% {
                box-shadow: 
                    0 0 60px rgba(16, 185, 129, 0.4),
                    0 0 100px rgba(16, 185, 129, 0.2),
                    inset 0 -4px 20px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow: 
                    0 0 80px rgba(16, 185, 129, 0.6),
                    0 0 120px rgba(16, 185, 129, 0.3),
                    inset 0 -4px 20px rgba(0, 0, 0, 0.2);
            }
        }
        .checkmark {
            width: 50px;
            height: 50px;
        }
        .checkmark path {
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: drawCheck 0.5s ease-out 0.8s forwards;
        }
        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }
        .bot-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
            opacity: 0;
            transform: translateY(20px);
            animation: logoIn 0.6s ease-out 0.3s forwards;
        }
        @keyframes logoIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.75rem;
            opacity: 0;
            transform: translateY(20px);
            animation: textIn 0.6s ease-out 0.4s forwards;
        }
        @keyframes textIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            animation: textIn 0.6s ease-out 0.5s forwards;
        }
        .tokens-info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: textIn 0.6s ease-out 0.6s forwards;
        }
        .tokens-info .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .tokens-info .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        .features {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            opacity: 0;
            transform: translateX(-20px);
            animation: featureIn 0.5s ease-out forwards;
        }
        .feature:nth-child(1) { animation-delay: 0.7s; }
        .feature:nth-child(2) { animation-delay: 0.8s; }
        .feature:nth-child(3) { animation-delay: 0.9s; }
        @keyframes featureIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .feature-icon svg {
            width: 16px;
            height: 16px;
            color: var(--success);
        }
        .feature-text {
            font-size: 0.95rem;
            color: var(--text);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            opacity: 0;
            transform: translateY(20px);
            animation: btnIn 0.6s ease-out 1s forwards;
            position: relative;
            overflow: hidden;
        }
        @keyframes btnIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn svg {
            width: 20px;
            height: 20px;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0;
            animation: textIn 0.6s ease-out 1.2s forwards;
        }
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
        }
        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            
            .card {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .icon-container {
                width: 100px;
                height: 100px;
            }
            .bot-logo {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="card">
            <div class="bot-logo">C</div>
            
            <div class="icon-container">
                <div class="icon-circle">
                    <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </div>
            
            <h1>Оплата прошла успешно!</h1>
            <p class="subtitle">Спасибо за покупку токенов. Они уже зачислены на ваш аккаунт в CerberAI.</p>
            
            <div class="tokens-info">
                <div class="label">Зачислено</div>
                <div class="value">Токены уже на вашем аккаунте!</div>
            </div>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </div>
                    <span class="feature-text">Мгновенное зачисление токенов</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <span class="feature-text">Безопасная оплата через СБП</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                        </svg>
                    </div>
                    <span class="feature-text">Работает с любой суммой</span>
                </div>
            </div>
            
            <!-- ССЫЛКА НА БОТА - ЗАМЕНИТЕ "YOUR_BOT_LINK" НА ССЫЛКУ ВАШЕГО БОТА -->
            <a href="https://t.me/YOUR_BOT_USERNAME" class="btn" target="_blank">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.37-.49 1.02-.75 3.98-1.73 6.64-2.87 7.97-3.43 3.8-1.6 4.59-1.88 5.1-1.89.11 0 .37.03.54.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/>
                </svg>
                Вернуться в CerberAI
            </a>
            
            <p class="footer">Приятного использования CerberAI</p>
        </div>
    </div>
    <script>
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 3 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            
            const colors = ['#6366f1', '#22d3ee', '#10b981'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            
            particle.style.animation = `float ${Math.random() * 3 + 3}s ease-in-out infinite`;
            particlesContainer.appendChild(particle);
        }
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0%, 100% {
                    opacity: 0;
                    transform: translateY(0) translateX(0);
                }
                25% {
                    opacity: 0.6;
                }
                50% {
                    opacity: 0.3;
                    transform: translateY(-100px) translateX(20px);
                }
                75% {
                    opacity: 0.6;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
